agent:
  name: "edge_vehicle_agent"
  max_context_turns: 5
  context_timeout_seconds: 30
  max_agent_iterations: 5

zmq:
  asr_recv_port: 5555
  llm_req_address: "tcp://127.0.0.1:8899"
  llm_result_port: 5559
  tts_req_address: "tcp://127.0.0.1:7777"
  recv_timeout_ms: 100
  llm_timeout_ms: 30000

rag:
  model_path: "../automotive_edge_rag/models"
  vector_db_path: "../automotive_edge_rag/python/vector_db"
  default_top_k: 5
  default_threshold: 0.5

llm:
  model_name: "deepseek-r1-distill-qwen-1.5b"
  max_tokens: 256
  temperature: 0.7

intent:
  greeting_patterns: ["你好", "嗨", "hello", "hi", "早上好", "晚上好", "再见", "拜拜"]
  command_patterns: ["打开", "关闭", "启动", "停止", "设置", "调节", "播放"]
  factual_patterns: ["怎么", "如何", "什么是", "是什么", "多少", "多久", "哪里", "哪个"]
  complex_patterns: ["为什么", "原因", "原理", "解释", "区别", "比较"]

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"